version: "3.9"

services:
  service-id-pilot:
    image: nginx:alpine
    ports:
      - "${SERVICE_HOST:-127.0.0.1}:${SERVICE_ID_PILOT_PORT}:80"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${SERVICE_ID_PILOT_PORT}/"]
      interval: 30s
      timeout: 5s
      retries: 3

  service-manager-pilot:
    image: nginx:alpine
    ports:
      - "${SERVICE_MANAGER_PILOT_PORT}:80"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${SERVICE_MANAGER_PILOT_PORT}/"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 10s
      timeout: 5s
      retries: 5
