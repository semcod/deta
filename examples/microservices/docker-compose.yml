version: "3.9"

# Example: microservices
# Purpose: Full microservice stack with API gateway, multiple backends, shared DB.
# Shows how deta scan handles hub detection (postgres depended on by many).
# Run:   deta scan .
# Expected: postgres detected as hub; no port conflicts; all services have healthchecks

services:
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - user-service
      - order-service
      - inventory-service
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  user-service:
    image: myapp/user-service:latest
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://app:${DB_PASSWORD}@postgres:5432/users
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  order-service:
    image: myapp/order-service:latest
    ports:
      - "8002:8000"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    environment:
      DATABASE_URL: postgresql://app:${DB_PASSWORD}@postgres:5432/orders
      QUEUE_URL: amqp://rabbitmq:5672
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  inventory-service:
    image: myapp/inventory-service:latest
    ports:
      - "8003:8000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://app:${DB_PASSWORD}@postgres:5432/inventory
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    image: myapp/worker:latest
    depends_on:
      - postgres
      - rabbitmq
    environment:
      DATABASE_URL: postgresql://app:${DB_PASSWORD}@postgres:5432/app
      QUEUE_URL: amqp://rabbitmq:5672
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  pg-data:
